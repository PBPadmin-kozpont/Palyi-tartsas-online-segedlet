<script>
    var round = 1
    var card_active = []

                        description: "leírás",

                        weight: 1,

    function elemTorles(lista, elem) {
  const index = lista.indexOf(elem);

  if (index !== -1) {
    lista.splice(index, 1);
  }

  return lista;
}

// Példa:
const lista = [1, 2, 3, 4];
elemTorles(lista, 3);

console.log(lista); // [1, 2, 4]
    function add_card(card) {
        var flexcontainer = document.getElementById("flex-container")
        var x = document.createElement("div")
        x.className = "card"
        flexcontainer.appendChild(x)
        var t1 = document.createElement("h1")
        t1.innerHTML = card.type
        var t2 = document.createElement("p")
        t2.innerHTML = card.title
        var t3 = document.createElement("p")
        t3.innerHTML = card.description
        var t4 = document.createElement("p")
        t4.innerHTML = "Határidő: "+card.deadline+" kör"
        t4.id = "t4"
        x.appendChild(t1)
        x.appendChild(t2)
        x.appendChild(t3)
        x.appendChild(t4)
        elemTorles(action_cards, card)

        card_active.push(x)
        active_card.push(card)
    }

    function weightedRandom(items) {
  // Súlyok összege
  const totalWeight = items.reduce((sum, item) => sum + item.weight, 0);

  // Random szám 0 és totalWeight között
  let random = Math.random() * totalWeight;

  // Kiválasztás
  for (const item of items) {
    random -= item.weight;

    if (random < 0) {
      return item;
    }
  }
}
    function bt2() {
